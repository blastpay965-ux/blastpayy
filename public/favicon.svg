<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1b082c"/>
      <stop offset="100%" stop-color="#07020d"/>
    </radialGradient>
    <!-- Primary Green & Purple Theme Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#a367ff"/>
    </linearGradient>
    <!-- Glowing Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Circle (Sleek dark theme outline) -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#primaryGrad)" stroke-width="8"/>

  <!-- Logo Base: Sleek Geometric Diamond / Shield Shape -->
  <path d="M256 80 L390 170 L390 342 L256 432 L122 342 L122 170 Z" fill="rgba(163, 103, 255, 0.08)" stroke="url(#primaryGrad)" stroke-width="12" filter="url(#glow)"/>

  <!-- Core Blast/Lightning Bolt representing payment speed -->
  <path d="M280 130 L160 270 L250 270 L220 380 L340 240 L250 240 Z" fill="url(#primaryGrad)" filter="url(#glow)"/>

  <!-- Circle accents representing currency / payout -->
  <circle cx="256" cy="256" r="55" fill="none" stroke="#00e676" stroke-width="4" stroke-dasharray="8 8" opacity="0.8"/>
</svg>
